pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      glob: "*.{js,ts,jsx,tsx}"
      run: pnpm exec oxlint --fix {staged_files}
      stage_fixed: true

    - name: oxfmt
      glob: "*.{js,ts,jsx,tsx,md,css,yml,yaml,json}"
      run: pnpm exec oxfmt --write {staged_files}
      stage_fixed: true
